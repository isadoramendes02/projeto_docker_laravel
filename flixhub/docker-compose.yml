version: '3.8'

services:
  web:
    build: .
    container_name: flixhub_web
    restart: always
    ports:
      - "8000:80" # Faz a porta 8000 e a setinha aparecerem no Docker Desktop!
    volumes:
    - .:/var/www/html:delegated
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: flixhub_db2
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: flixhub
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: